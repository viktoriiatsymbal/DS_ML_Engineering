services:
  mlflow:
    build:
      context: .
      dockerfile: mlflow_server/Dockerfile
    container_name: mlflow-server
    user: "${LOCAL_UID:-1000}:0"
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow_data:/server
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=5)"
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s
    networks:
      - mlflow-net

  airflow:
    image: apache/airflow:2.10.5-python3.11
    container_name: airflow
    user: "${LOCAL_UID:-1000}:0"
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_ARTIFACT_URI: mlflow-artifacts://mlflow:5000
      _PIP_ADDITIONAL_REQUIREMENTS: -r /requirements.txt
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./requirements.txt:/requirements.txt
      - ./airflow_db:/opt/airflow
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username airflow
      --password airflow
      --firstname Airflow
      --lastname User
      --role Admin
      --email airflow@example.com || true &&
      airflow webserver"
    networks:
      - mlflow-net

  airflow-scheduler:
    image: apache/airflow:2.10.5-python3.11
    container_name: airflow-scheduler
    user: "${LOCAL_UID:-1000}:0"
    depends_on:
      mlflow:
        condition: service_healthy
      airflow:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_ARTIFACT_URI: mlflow-artifacts://mlflow:5000
      _PIP_ADDITIONAL_REQUIREMENTS: -r /requirements.txt
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./requirements.txt:/requirements.txt
      - ./airflow_db:/opt/airflow
    command: airflow scheduler
    networks:
      - mlflow-net

networks:
  mlflow-net: